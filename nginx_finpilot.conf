# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for Helias FinPilot Dashboard
# Place at: /etc/nginx/sites-available/finpilot
# Then: ln -s /etc/nginx/sites-available/finpilot /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name 72.60.133.179;   # Replace with your domain when ready

    # Dashboard
    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Required for Streamlit websocket
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # Streamlit static files
    location /_stcore/stream {
        proxy_pass         http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL: When you have a domain (e.g. finpilot.helias.ai)
# Run: certbot --nginx -d finpilot.helias.ai
# Certbot will auto-add HTTPS below.
# ─────────────────────────────────────────────────────────────────────────────
